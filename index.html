<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Quality Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        pre, code { font-family: 'Fira Code', monospace; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-slate-900 mb-2">Code Quality Assistant</h1>
            <p class="text-slate-600">Paste your code below to analyze bugs, security, and performance.</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4 mb-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Select Language</label>
                    <select id="languageSelect" class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                    </select>
                </div>
                <div class="flex-none flex items-end">
                    <button onclick="runAnalysis()" id="analyzeBtn" class="w-full md:w-auto px-8 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors flex items-center justify-center gap-2">
                        <span>Analyze Code</span>
                        <div id="btnSpinner" class="hidden animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
                    </button>
                </div>
            </div>
            <textarea id="codeInput" rows="12" class="block p-4 w-full text-sm text-slate-900 bg-slate-50 rounded-lg border border-slate-300 font-mono focus:ring-blue-500 focus:border-blue-500" placeholder="// Paste your code here..."></textarea>
        </div>

        <!-- Results Section -->
        <div id="resultsWrapper" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <!-- Tabs -->
            <div class="border-b border-slate-200 bg-slate-50 overflow-x-auto">
                <ul class="flex whitespace-nowrap -mb-px text-sm font-medium text-center" id="tabList">
                    <li class="me-2">
                        <button onclick="switchTab('bugs')" id="tab-bugs" class="inline-block p-4 border-b-2 border-transparent rounded-t-lg hover:text-slate-600 hover:border-slate-300">Bugs</button>
                    </li>
                    <li class="me-2">
                        <button onclick="switchTab('fixed')" id="tab-fixed" class="inline-block p-4 border-b-2 border-transparent rounded-t-lg hover:text-slate-600 hover:border-slate-300">Fixed</button>
                    </li>
                    <li class="me-2">
                        <button onclick="switchTab('optimized')" id="tab-optimized" class="inline-block p-4 border-b-2 border-transparent rounded-t-lg hover:text-slate-600 hover:border-slate-300">Optimized</button>
                    </li>
                    <li class="me-2">
                        <button onclick="switchTab('refactored')" id="tab-refactored" class="inline-block p-4 border-b-2 border-transparent rounded-t-lg hover:text-slate-600 hover:border-slate-300">Refactored</button>
                    </li>
                    <li class="me-2">
                        <button onclick="switchTab('explained')" id="tab-explained" class="inline-block p-4 border-b-2 border-transparent rounded-t-lg hover:text-slate-600 hover:border-slate-300">Explained</button>
                    </li>
                    <li class="me-2">
                        <button onclick="switchTab('security')" id="tab-security" class="inline-block p-4 border-b-2 border-transparent rounded-t-lg hover:text-slate-600 hover:border-slate-300">Security</button>
                    </li>
                    <li class="me-2">
                        <button onclick="switchTab('readme')" id="tab-readme" class="inline-block p-4 border-b-2 border-transparent rounded-t-lg hover:text-slate-600 hover:border-slate-300">README</button>
                    </li>
                    <li class="me-2">
                        <button onclick="switchTab('report')" id="tab-report" class="inline-block p-4 border-b-2 border-transparent rounded-t-lg hover:text-slate-600 hover:border-slate-300">Final Report</button>
                    </li>
                </ul>
            </div>

            <!-- Tab Content -->
            <div class="p-6">
                <div id="loadingOverlay" class="hidden flex flex-col items-center justify-center py-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                    <p class="text-slate-500 font-medium">Analyzing code with AI...</p>
                </div>
                <div id="tabContent">
                    <pre id="preBlock" class="text-sm text-slate-800 p-4 bg-slate-50 rounded-lg overflow-x-auto whitespace-pre-wrap"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tabs = ['bugs', 'fixed', 'optimized', 'refactored', 'explained', 'security', 'readme', 'report'];
        let activeTab = 'bugs';
        let resultsData = {};

        function runAnalysis() {
            const code = document.getElementById('codeInput').value;
            if (!code.trim()) {
                alert('Please paste some code first!');
                return;
            }

            // UI State: Loading
            const btn = document.getElementById('analyzeBtn');
            const spinner = document.getElementById('btnSpinner');
            const resultsWrapper = document.getElementById('resultsWrapper');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const tabContent = document.getElementById('tabContent');

            btn.disabled = true;
            spinner.classList.remove('hidden');
            resultsWrapper.classList.remove('hidden');
            loadingOverlay.classList.remove('hidden');
            tabContent.classList.add('hidden');

            // Simulate API Call
            setTimeout(() => {
                // Mock Data
                resultsData = {
                    bugs: "[-] Found 2 potential issues:\n1. Unused variable 'temp'\n2. Possible null pointer reference on line 42",
                    fixed: "// Fixed version of your code\nfunction hello() {\n  console.log('Fixed bugs!');\n}",
                    optimized: "// Optimized for performance\nconst data = items.map(x => x.val);",
                    refactored: "// Cleaned up logic\nclass UserHandler {\n  static process(data) { ... }\n}",
                    explained: "This code implements a basic sorting algorithm with O(n^2) complexity...",
                    security: "[PASS] No hardcoded secrets found.\n[WARN] Using eval() is dangerous.",
                    readme: "# Code Analysis\nGenerated by Assistant.\n\n## Usage\nRun the main script...",
                    report: "Final Score: 85/100\nMaintainability: High\nSecurity: Medium"
                };

                // UI State: Loaded
                btn.disabled = false;
                spinner.classList.add('hidden');
                loadingOverlay.classList.add('hidden');
                tabContent.classList.remove('hidden');
                
                switchTab('bugs');
            }, 1500);
        }

        function switchTab(tabName) {
            activeTab = tabName;
            
            // Update Tab UI
            tabs.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === tabName) {
                    el.classList.add('tab-active');
                    el.classList.remove('text-slate-500');
                } else {
                    el.classList.remove('tab-active');
                    el.classList.add('text-slate-500');
                }
            });

            // Update Content
            showResult(tabName, resultsData[tabName] || "No data available.");
        }

        function showResult(tabName, content) {
            const pre = document.getElementById('preBlock');
            pre.textContent = content;
        }
    </script>
    <script src="agents.js"></script>
    <script src="diff.js"></script>
    <script src="results.js"></script>
</body>
</html>
